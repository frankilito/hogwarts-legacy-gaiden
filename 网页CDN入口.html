<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<base href="https://cdn.jsdelivr.net/gh/frankilito/hogwarts-legacy-gaiden@main/">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
<title>霍格沃茨之遗·番外篇(CDN直连) | Hogwarts Legacy Gaiden</title>
<style>
@font-face{font-family:'Cinzel';src:url('assets/fonts/Cinzel.ttf');font-display:swap}
@font-face{font-family:'MaShan';src:url('assets/fonts/MaShanZheng.ttf');font-display:swap}
@font-face{font-family:'XiaoWei';src:url('assets/fonts/ZCOOLXiaoWei.ttf');font-display:swap}
:root{
  --gold:#c9a86a;--gold-hi:#f0d9a8;--ink:#efe6d0;--ink-dim:#b7ab8f;
  --bg-panel:rgba(16,13,10,.92);--bg-panel2:rgba(28,22,16,.94);
  --line:rgba(201,168,106,.4);--line-hi:rgba(240,217,168,.85);
  --red:#8e2f2f;--grn:#2f6b46;--blu:#2f4d8e;--ylw:#a8842f;
  --hp:#b8412f;--mp:#3d6fc4;--xp:#8e68d9;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'XiaoWei','Songti SC','STSong',serif;color:var(--ink);user-select:none;-webkit-user-select:none}
#c{position:fixed;inset:0;display:block}
.hidden{display:none!important}
h1,h2,h3,.title-font{font-family:'MaShan','Cinzel','Songti SC',serif;font-weight:400}
.en{font-family:'Cinzel',serif}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}

/* ---------- 覆盖层通用 ---------- */
.overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,rgba(24,18,10,.86),rgba(5,4,2,.97))}
.panel{background:var(--bg-panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.8),inset 0 0 40px rgba(201,168,106,.05);padding:26px 30px;position:relative}
.panel::before{content:'';position:absolute;inset:5px;border:1px solid rgba(201,168,106,.18);border-radius:7px;pointer-events:none}
.btn{display:inline-block;padding:10px 26px;border:1px solid var(--line);border-radius:6px;color:var(--gold-hi);font-size:17px;letter-spacing:2px;background:linear-gradient(180deg,rgba(201,168,106,.12),rgba(201,168,106,.03));transition:all .18s;text-align:center}
.btn:hover{border-color:var(--line-hi);background:linear-gradient(180deg,rgba(201,168,106,.26),rgba(201,168,106,.08));box-shadow:0 0 18px rgba(201,168,106,.25);transform:translateY(-1px)}
.btn.primary{border-color:var(--gold);font-size:19px}
.btn.small{padding:6px 14px;font-size:14px;letter-spacing:1px}
.btn:disabled{opacity:.35;pointer-events:none}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:14px 0}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(201,168,106,.35);border-radius:4px}::-webkit-scrollbar-track{background:rgba(0,0,0,.3)}

/* ---------- 加载屏 ---------- */
#loading{z-index:100;flex-direction:column;background:radial-gradient(ellipse at 50% 35%,#1a1408,#050402 75%)}
#loading .crest{font-size:84px;filter:drop-shadow(0 0 24px rgba(240,217,168,.5));animation:crestFloat 3s ease-in-out infinite}
@keyframes crestFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#loading h1{font-size:46px;color:var(--gold-hi);letter-spacing:8px;margin:18px 0 4px;text-shadow:0 0 30px rgba(240,217,168,.4)}
#loading .sub{font-family:'Cinzel';font-size:15px;letter-spacing:6px;color:var(--ink-dim);margin-bottom:34px}
#loadbar{width:min(480px,74vw);height:8px;border:1px solid var(--line);border-radius:5px;overflow:hidden;background:rgba(0,0,0,.5)}
#loadfill{height:100%;width:0%;background:linear-gradient(90deg,#7a5f2f,var(--gold-hi));box-shadow:0 0 12px rgba(240,217,168,.7);transition:width .2s}
#loadtext{margin-top:12px;font-size:14px;color:var(--ink-dim);letter-spacing:1px}
#loadtip{margin-top:26px;max-width:520px;text-align:center;font-size:15px;color:#9c8f74;line-height:1.7;font-style:italic}

/* ---------- 主菜单 ---------- */
#mainmenu{flex-direction:column;background:transparent;pointer-events:none}
#mainmenu>*{pointer-events:auto}
#mainmenu .titlebox{text-align:center;margin-bottom:6vh;animation:fadeDown 1.2s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1}}
#mainmenu h1{font-size:min(72px,9vw);color:var(--gold-hi);letter-spacing:10px;text-shadow:0 2px 6px #000,0 0 44px rgba(240,217,168,.45)}
#mainmenu .sub{font-family:'Cinzel';letter-spacing:8px;color:var(--ink-dim);font-size:16px;margin-top:8px}
#mainmenu .menu{display:flex;flex-direction:column;gap:14px;width:280px;animation:fadeDown 1.2s .3s ease backwards}
#menuVersion{position:fixed;bottom:12px;right:16px;font-size:12px;color:#6d6350;letter-spacing:1px}

/* ---------- 角色创建 ---------- */
#charcreate{align-items:stretch;justify-content:flex-start;flex-direction:row;background:linear-gradient(90deg,rgba(5,4,2,.96) 0 42%,rgba(5,4,2,.2) 70%,rgba(5,4,2,0))}
#ccLeft{width:min(560px,46vw);height:100%;overflow-y:auto;padding:4vh 34px;display:flex;flex-direction:column;gap:16px}
#ccLeft h2{font-size:34px;color:var(--gold-hi);letter-spacing:4px}
.cc-section{border:1px solid rgba(201,168,106,.25);border-radius:8px;padding:14px 16px;background:rgba(20,16,10,.6)}
.cc-section h3{font-size:18px;color:var(--gold);margin-bottom:10px;letter-spacing:2px}
.cc-grid{display:flex;flex-wrap:wrap;gap:8px}
.cc-opt{border:1px solid rgba(201,168,106,.3);border-radius:6px;padding:8px 12px;font-size:15px;color:var(--ink-dim);transition:all .15s;background:rgba(0,0,0,.3)}
.cc-opt:hover{color:var(--ink);border-color:var(--line-hi)}
.cc-opt.sel{color:var(--gold-hi);border-color:var(--gold-hi);background:rgba(201,168,106,.16);box-shadow:0 0 10px rgba(201,168,106,.25)}
.cc-opt .tag{display:block;font-size:12px;color:#8d8064;margin-top:2px}
.house-card{width:calc(50% - 4px);padding:10px 12px;text-align:left}
.house-card b{font-size:17px;letter-spacing:2px}
.house-card .en{display:block;font-size:11px;letter-spacing:2px;opacity:.75;margin-top:1px}
.house-card p{font-size:12.5px;color:#a89a7e;margin-top:5px;line-height:1.5}
#ccName{width:100%;background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:6px;padding:10px 14px;color:var(--gold-hi);font-size:18px;font-family:inherit;letter-spacing:2px;outline:none}
#ccName:focus{border-color:var(--line-hi)}
.swatches{display:flex;gap:7px;flex-wrap:wrap}
.swatch{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.18);cursor:pointer;transition:transform .12s}
.swatch:hover{transform:scale(1.15)}
.swatch.sel{border-color:var(--gold-hi);box-shadow:0 0 10px rgba(240,217,168,.6)}
#ccBottom{display:flex;gap:12px;margin-top:4px;padding-bottom:3vh}

/* ---------- HUD ---------- */
#hud{position:fixed;inset:0;z-index:20;pointer-events:none;font-size:15px}
#hudTL{position:absolute;top:16px;left:18px;display:flex;flex-direction:column;gap:6px}
.bar{width:230px;height:14px;border:1px solid rgba(0,0,0,.75);outline:1px solid var(--line);border-radius:4px;background:rgba(0,0,0,.55);overflow:hidden;position:relative}
.bar .fill{height:100%;transition:width .25s;border-radius:2px}
.bar.hp .fill{background:linear-gradient(180deg,#d4604a,var(--hp))}
.bar.mp .fill{background:linear-gradient(180deg,#6c9be0,var(--mp))}
.bar.xp{height:5px;width:230px}
.bar.xp .fill{background:var(--xp)}
.bar .txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10.5px;letter-spacing:1px;color:rgba(255,255,255,.92);text-shadow:0 1px 2px #000}
#hudLevel{display:inline-flex;align-items:center;gap:8px;color:var(--gold-hi);text-shadow:0 1px 3px #000;font-size:14px}
#hudGold{color:#e8c96a;text-shadow:0 1px 3px #000;font-size:14px}
#hudTR{position:absolute;top:14px;right:18px;text-align:right;text-shadow:0 1px 4px #000}
#hudDate{font-size:16px;color:var(--gold-hi);letter-spacing:2px}
#hudPhase{font-size:13.5px;color:var(--ink-dim);margin-top:2px;letter-spacing:1px}
#hudZone{font-size:13.5px;color:#9fb4d8;margin-top:2px;letter-spacing:1px}
#hudObjective{position:absolute;top:110px;right:18px;max-width:300px;text-align:right;text-shadow:0 1px 4px #000}
#hudObjective .qname{color:var(--gold);font-size:14.5px;letter-spacing:1px}
#hudObjective .qstep{color:#cfc4a9;font-size:13px;margin-top:3px;line-height:1.5}
#spellbar{position:absolute;bottom:18px;right:20px;display:flex;gap:9px;align-items:flex-end}
.spell-slot{width:56px;height:56px;border:1px solid var(--line);border-radius:8px;background:rgba(10,8,5,.72);position:relative;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.spell-slot .key{position:absolute;top:-7px;left:-7px;width:19px;height:19px;border-radius:5px;background:#20180e;border:1px solid var(--line);font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--gold-hi)}
.spell-slot .cd{position:absolute;inset:0;background:rgba(0,0,0,.72);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
.spell-slot.active{border-color:var(--line-hi);box-shadow:0 0 14px rgba(240,217,168,.5)}
.spell-slot .nm{position:absolute;bottom:-16px;width:100%;text-align:center;font-size:10.5px;color:var(--ink-dim);letter-spacing:1px;white-space:nowrap}
#comboGauge{position:absolute;bottom:96px;right:22px;width:180px;display:none}
#hudPrompt{position:absolute;left:50%;top:58%;transform:translateX(-50%);text-align:center;text-shadow:0 1px 4px #000;font-size:16px;color:var(--gold-hi);letter-spacing:2px;background:rgba(8,6,3,.6);padding:8px 18px;border-radius:20px;border:1px solid rgba(201,168,106,.35)}
#hudPrompt .k{display:inline-block;border:1px solid var(--gold);border-radius:4px;padding:0 7px;margin-right:8px;font-size:14px;background:rgba(201,168,106,.15)}
#bossbar{position:absolute;top:26px;left:50%;transform:translateX(-50%);width:min(560px,70vw);text-align:center}
#bossbar .nm{font-size:17px;color:#e8b7b7;letter-spacing:4px;text-shadow:0 1px 4px #000;margin-bottom:5px}
#bossbar .bar{width:100%;height:12px}
#bossbar .fill{background:linear-gradient(180deg,#c46a5a,#7e2318)}
#subtitle{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);max-width:70vw;text-align:center;font-size:17px;color:#f3ecd8;text-shadow:0 1px 4px #000;line-height:1.6;letter-spacing:1px}
#toasts{position:absolute;top:22vh;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:rgba(14,11,6,.88);border:1px solid var(--line);border-radius:8px;padding:10px 22px;font-size:16px;color:var(--gold-hi);letter-spacing:2px;box-shadow:0 4px 20px rgba(0,0,0,.6);animation:toastIn .3s ease}
.toast.big{font-size:20px;padding:14px 34px;border-color:var(--line-hi)}
@keyframes toastIn{from{opacity:0;transform:translateY(-14px) scale(.94)}to{opacity:1}}
#dmgLayer{position:absolute;inset:0;overflow:hidden}
.dmg{position:absolute;font-family:'Cinzel',serif;font-weight:700;font-size:18px;color:#ffd88a;text-shadow:0 0 6px rgba(255,150,50,.8),0 1px 2px #000;animation:dmgUp .8s ease-out forwards;pointer-events:none}
.dmg.crit{font-size:24px;color:#ff9a5a}
.dmg.heal{color:#8ae09a}.dmg.player{color:#ff7a6a}
@keyframes dmgUp{0%{opacity:0;transform:translateY(6px) scale(.7)}15%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-44px) scale(.95)}}
#lockon{position:absolute;width:44px;height:44px;border:2px solid rgba(255,120,90,.9);border-radius:50%;box-shadow:0 0 14px rgba(255,120,90,.6);display:none;align-items:center;justify-content:center;font-size:10px;color:#ffb0a0}
#hudClock{width:54px;height:54px;margin-top:6px;margin-left:auto}

/* ---------- 对话 ---------- */
#dialogue{position:fixed;left:50%;bottom:34px;transform:translateX(-50%);width:min(860px,92vw);z-index:30;pointer-events:auto}
#dlgBox{background:linear-gradient(180deg,rgba(20,16,10,.94),rgba(12,9,5,.96));border:1px solid var(--line);border-radius:10px;padding:18px 24px 16px;box-shadow:0 8px 40px rgba(0,0,0,.7)}
#dlgName{position:absolute;top:-15px;left:22px;background:#241c10;border:1px solid var(--gold);border-radius:6px;padding:3px 16px;font-size:16px;color:var(--gold-hi);letter-spacing:3px}
#dlgAffinity{position:absolute;top:-13px;right:24px;font-size:12.5px;color:#d88ea6}
#dlgText{font-size:17.5px;line-height:1.75;min-height:58px;color:#efe6d0;letter-spacing:.5px}
#dlgChoices{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.dlg-choice{text-align:left;border:1px solid rgba(201,168,106,.3);border-radius:6px;padding:9px 16px;font-size:15.5px;color:var(--ink-dim);transition:all .14s;background:rgba(0,0,0,.25)}
.dlg-choice:hover{color:var(--gold-hi);border-color:var(--line-hi);background:rgba(201,168,106,.12);transform:translateX(4px)}
.dlg-choice .aff{font-size:12px;color:#d88ea6;margin-left:8px}
#dlgNext{position:absolute;right:20px;bottom:10px;color:var(--gold);font-size:13px;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

/* ---------- 主面板(Tab) ---------- */
#menuPanel{z-index:40}
#menuPanel .panel{width:min(1020px,94vw);height:min(660px,90vh);display:flex;flex-direction:column;padding:0;overflow:hidden}
#mpTabs{display:flex;border-bottom:1px solid var(--line);background:rgba(0,0,0,.35)}
.mp-tab{padding:13px 26px;font-size:16.5px;letter-spacing:3px;color:var(--ink-dim);border-right:1px solid rgba(201,168,106,.15);transition:all .15s}
.mp-tab:hover{color:var(--ink)}
.mp-tab.sel{color:var(--gold-hi);background:rgba(201,168,106,.12);box-shadow:inset 0 -2px 0 var(--gold)}
#mpBody{flex:1;overflow:auto;padding:20px 26px}
#mpHint{padding:8px 26px;border-top:1px solid rgba(201,168,106,.2);font-size:12.5px;color:#847758;letter-spacing:1px}

/* 背包/商店 */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,64px);gap:10px}
.inv-slot{width:64px;height:64px;border:1px solid rgba(201,168,106,.3);border-radius:8px;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;cursor:pointer;transition:all .13s}
.inv-slot:hover{border-color:var(--line-hi);background:rgba(201,168,106,.1)}
.inv-slot .cnt{position:absolute;bottom:2px;right:5px;font-size:12px;color:#fff;text-shadow:0 1px 2px #000}
.inv-slot.sel{border-color:var(--gold-hi);box-shadow:0 0 12px rgba(240,217,168,.4)}
.item-detail{border:1px solid rgba(201,168,106,.25);border-radius:8px;padding:14px 18px;background:rgba(0,0,0,.3);min-height:120px}

/* 技能树 */
#skillTreeWrap{display:flex;gap:0;height:100%}
#skillCanvasBox{flex:1;position:relative;overflow:hidden;border-right:1px solid rgba(201,168,106,.2)}
#skillInfo{width:270px;padding:16px}
.sk-node{position:absolute;width:54px;height:54px;border-radius:50%;border:2px solid rgba(201,168,106,.4);background:radial-gradient(circle at 35% 30%,#3a2f1c,#171006);display:flex;align-items:center;justify-content:center;font-size:23px;cursor:pointer;transition:all .15s;transform:translate(-50%,-50%)}
.sk-node:hover{border-color:var(--line-hi);box-shadow:0 0 16px rgba(240,217,168,.4)}
.sk-node.learned{border-color:#e9d9a8;background:radial-gradient(circle at 35% 30%,#7a5f2f,#33240d);box-shadow:0 0 18px rgba(240,217,168,.55)}
.sk-node.avail{border-color:#8fb8ff;animation:pulse 1.6s infinite}
.sk-node.locked{opacity:.38;filter:grayscale(.7)}
@keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(143,184,255,.2)}50%{box-shadow:0 0 20px rgba(143,184,255,.65)}}

/* 地图/日程 */
.map-room{position:absolute;border:1px solid rgba(201,168,106,.45);border-radius:6px;background:rgba(201,168,106,.08);display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:14px;letter-spacing:2px;color:var(--ink);cursor:pointer;transition:all .15s;text-align:center;line-height:1.4}
.map-room:hover{background:rgba(201,168,106,.22);border-color:var(--line-hi);box-shadow:0 0 14px rgba(201,168,106,.3)}
.map-room.cur{border-color:#8fd0ff;background:rgba(80,140,220,.18)}
.map-room .ic{font-size:20px}
.sched-row{display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid rgba(201,168,106,.14);font-size:15px;align-items:center}
.sched-row .time{width:120px;color:var(--gold);letter-spacing:1px}
.sched-row.now{background:rgba(201,168,106,.12);border-left:3px solid var(--gold)}
.sched-row.done{opacity:.45;text-decoration:line-through}

/* 任务 */
.q-item{border:1px solid rgba(201,168,106,.22);border-radius:8px;padding:12px 16px;margin-bottom:10px;background:rgba(0,0,0,.25);cursor:pointer}
.q-item:hover{border-color:var(--line-hi)}
.q-item.tracked{border-color:var(--gold)}
.q-item h4{color:var(--gold-hi);font-size:16.5px;letter-spacing:1px;display:flex;justify-content:space-between}
.q-item h4 .tag{font-size:12px;color:#8fa8d0;border:1px solid rgba(143,168,208,.4);padding:1px 8px;border-radius:10px}
.q-item p{font-size:13.5px;color:#bdb096;margin-top:5px;line-height:1.55}
.q-item .done{color:#8ae09a}

/* ---------- 小游戏通用 ---------- */
.mg-wrap{z-index:45;background:rgba(4,3,1,.78)}
.mg-panel{width:min(760px,94vw);text-align:center}
.mg-panel h2{font-size:26px;color:var(--gold-hi);letter-spacing:4px;margin-bottom:6px}
.mg-panel .mg-sub{color:var(--ink-dim);font-size:14px;margin-bottom:14px;line-height:1.6}
#runeCanvas{background:radial-gradient(circle at 50% 45%,rgba(40,32,18,.9),rgba(10,8,4,.95));border:1px solid var(--line);border-radius:10px;cursor:crosshair;touch-action:none}
.mg-score{font-size:20px;color:var(--gold-hi);margin-top:10px;letter-spacing:2px}
.potion-row{display:flex;gap:10px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.ing-chip{border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-size:15px;cursor:pointer;background:rgba(0,0,0,.35);transition:all .13s}
.ing-chip:hover{border-color:var(--line-hi);transform:translateY(-2px)}
.ing-chip.used{opacity:.3;pointer-events:none}
#cauldronView{width:220px;height:150px;margin:0 auto;border-radius:12px;position:relative;overflow:hidden}
.stir-zone{width:190px;height:190px;border-radius:50%;border:2px dashed rgba(201,168,106,.5);margin:10px auto;position:relative;touch-action:none;cursor:grab}

/* ---------- 决斗/联机 ---------- */
#mpMenu .panel{width:min(560px,92vw)}
.room-code{font-family:'Cinzel';font-size:34px;letter-spacing:10px;color:var(--gold-hi);text-align:center;padding:10px;border:1px dashed var(--line);border-radius:8px;margin:10px 0}
#mpJoinInput{width:100%;background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:6px;padding:12px;color:var(--gold-hi);font-size:22px;text-align:center;letter-spacing:8px;font-family:'Cinzel';outline:none;text-transform:uppercase}
.mp-status{font-size:13.5px;color:#9dd09d;text-align:center;margin-top:8px;min-height:18px}

/* ---------- 装饰模式 ---------- */
#decorBar{position:fixed;bottom:0;left:0;right:0;z-index:35;background:linear-gradient(0deg,rgba(10,8,4,.95),rgba(10,8,4,.75));border-top:1px solid var(--line);padding:10px 16px;display:flex;gap:10px;align-items:center;overflow-x:auto}
.decor-item{min-width:76px;border:1px solid rgba(201,168,106,.3);border-radius:8px;padding:8px 6px;text-align:center;font-size:12px;color:var(--ink-dim);cursor:pointer;background:rgba(0,0,0,.4)}
.decor-item:hover{border-color:var(--line-hi);color:var(--ink)}
.decor-item.sel{border-color:var(--gold-hi);color:var(--gold-hi)}
.decor-item .ic{font-size:24px;display:block;margin-bottom:3px}

/* ---------- 淡入淡出/剧场 ---------- */
#fader{position:fixed;inset:0;background:#000;z-index:60;pointer-events:none;opacity:1;transition:opacity .6s}
#cinema{position:fixed;left:0;right:0;z-index:24;pointer-events:none;height:0;transition:height .5s;background:#000}
#cinemaTop{top:0}#cinemaBottom{bottom:0}
.letterbox #cinemaTop,.letterbox #cinemaBottom{height:9vh}

/* ---------- 移动端 ---------- */
#touchUI{position:fixed;inset:0;z-index:22;pointer-events:none;display:none}
#joyBase{position:absolute;bottom:86px;left:36px;width:120px;height:120px;border:1px solid rgba(255,255,255,.25);border-radius:50%;background:rgba(255,255,255,.05);pointer-events:auto}
#joyKnob{position:absolute;left:50%;top:50%;width:52px;height:52px;border-radius:50%;background:rgba(240,217,168,.35);border:1px solid rgba(240,217,168,.6);transform:translate(-50%,-50%)}
.tbtn{position:absolute;width:62px;height:62px;border-radius:50%;background:rgba(20,16,8,.55);border:1px solid var(--line);color:var(--gold-hi);font-size:13px;pointer-events:auto;display:flex;align-items:center;justify-content:center;letter-spacing:1px}
@media (pointer:coarse){#touchUI{display:block}}
@media (max-width:820px){
  #ccLeft{width:100vw}
  #charcreate{background:rgba(5,4,2,.92)}
  .bar{width:170px}
  #dlgText{font-size:15.5px}
  .mp-tab{padding:11px 14px;font-size:14px;letter-spacing:1px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- 加载 -->
<div id="loading" class="overlay">
  <div class="crest">🏰</div>
  <h1>霍格沃茨之遗</h1>
  <div class="sub">· 番 外 篇 · A FAN GAIDEN ·</div>
  <div id="loadbar"><div id="loadfill"></div></div>
  <div id="loadtext">正在点亮蜡烛…</div>
  <div id="loadtip"></div>
</div>

<!-- 主菜单 -->
<div id="mainmenu" class="overlay hidden">
  <div class="titlebox">
    <h1>霍格沃茨之遗</h1>
    <div class="sub">· 番 外 篇 · 1927 ·</div>
  </div>
  <div class="menu">
    <button class="btn primary" id="btnContinue">继续旅程</button>
    <button class="btn" id="btnNew">新的学年</button>
    <button class="btn" id="btnLoad">读取存档</button>
    <button class="btn" id="btnMpMenu">联机大厅</button>
    <button class="btn" id="btnSettings">设置</button>
  </div>
  <div id="menuVersion">同人非商业作品 · KayKit CC0 assets · v1.0</div>
</div>

<!-- 角色创建 -->
<div id="charcreate" class="overlay hidden">
  <div id="ccLeft">
    <h2>入学登记 <span class="en" style="font-size:14px;letter-spacing:3px;color:var(--ink-dim)">ENROLLMENT · 1927</span></h2>
    <div class="cc-section"><h3>姓名</h3><input id="ccName" maxlength="10" placeholder="写下你的名字…" value=""></div>
    <div class="cc-section"><h3>分院 <span style="font-size:12px;color:#8d8064">— 分院帽在你耳边低语</span></h3><div class="cc-grid" id="ccHouses"></div></div>
    <div class="cc-section"><h3>魔法专长</h3><div class="cc-grid" id="ccTalents"></div></div>
    <div class="cc-section"><h3>性格</h3><div class="cc-grid" id="ccTraits"></div></div>
    <div class="cc-section"><h3>外貌</h3>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div><div style="font-size:13px;color:#8d8064;margin-bottom:5px">体型</div><div class="cc-grid" id="ccBodies"></div></div>
        <div><div style="font-size:13px;color:#8d8064;margin-bottom:5px">发型</div><div class="cc-grid" id="ccHairs"></div></div>
        <div><div style="font-size:13px;color:#8d8064;margin-bottom:5px">发色</div><div class="swatches" id="ccHairColors"></div></div>
        <div><div style="font-size:13px;color:#8d8064;margin-bottom:5px">肤色</div><div class="swatches" id="ccSkins"></div></div>
      </div>
    </div>
    <div id="ccBottom">
      <button class="btn" id="ccBack">返回</button>
      <button class="btn primary" style="flex:1" id="ccDone">戴上分院帽 ➤</button>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="hudTL">
    <div id="hudLevel"><span id="lvNum">Lv.1</span><span id="hudName"></span><span id="hudHouse"></span></div>
    <div class="bar hp"><div class="fill" id="hpFill" style="width:100%"></div><div class="txt" id="hpTxt"></div></div>
    <div class="bar mp"><div class="fill" id="mpFill" style="width:100%"></div><div class="txt" id="mpTxt"></div></div>
    <div class="bar xp"><div class="fill" id="xpFill" style="width:0%"></div></div>
    <div id="hudGold">🪙 0</div>
  </div>
  <div id="hudTR">
    <div id="hudDate">九月一日 · 第1天</div>
    <div id="hudPhase">🌅 清晨</div>
    <div id="hudZone">城堡大厅</div>
    <canvas id="hudClock" width="108" height="108"></canvas>
  </div>
  <div id="hudObjective"></div>
  <div id="bossbar" class="hidden"><div class="nm"></div><div class="bar"><div class="fill" style="width:100%"></div></div></div>
  <div id="spellbar"></div>
  <div id="comboGauge"></div>
  <div id="hudPrompt" class="hidden"></div>
  <div id="subtitle"></div>
  <div id="dmgLayer"></div>
  <div id="lockon"></div>
  <div id="toasts"></div>
</div>

<!-- 对话 -->
<div id="dialogue" class="hidden">
  <div id="dlgBox">
    <div id="dlgName"></div>
    <div id="dlgAffinity"></div>
    <div id="dlgText"></div>
    <div id="dlgChoices"></div>
    <div id="dlgNext">▼ 空格继续</div>
  </div>
</div>

<!-- 主面板 -->
<div id="menuPanel" class="overlay hidden">
  <div class="panel">
    <div id="mpTabs"></div>
    <div id="mpBody"></div>
    <div id="mpHint">Tab/Esc 关闭 · 1-7 切换页签</div>
  </div>
</div>

<!-- 小游戏容器 -->
<div id="minigame" class="overlay mg-wrap hidden"><div class="panel mg-panel" id="mgPanel"></div></div>

<!-- 联机菜单 -->
<div id="mpMenu" class="overlay hidden"><div class="panel" style="width:min(560px,92vw)" id="mpMenuBody"></div></div>

<!-- 装饰栏 -->
<div id="decorBar" class="hidden"></div>

<!-- 剧场黑边/淡场 -->
<div id="cinemaTop" ></div><div id="cinemaBottom"></div>
<div id="fader"></div>

<!-- 触屏 -->
<div id="touchUI">
  <div id="joyBase"><div id="joyKnob"></div></div>
  <button class="tbtn" id="tbA" style="right:30px;bottom:150px">施法</button>
  <button class="tbtn" id="tbB" style="right:104px;bottom:86px">闪避</button>
  <button class="tbtn" id="tbE" style="right:30px;bottom:236px;font-size:18px">✋</button>
  <button class="tbtn" id="tbMenu" style="right:104px;bottom:236px;width:48px;height:48px">☰</button>
</div>

<script type="importmap">
{"imports":{
  "three":"./libs/three.module.js",
  "three/addons/":"./libs/jsm/"
}}
</script>
<script>
// 魔法缓存:让 50MB 资源只下一次,弱网断点续传
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
